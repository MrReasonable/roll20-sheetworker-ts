version: 2
updates:
  # Keep GitHub Actions (including SHA-pinned ones) up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep npm dev dependencies up to date.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-dev:
        patterns: ["*"]
    ignore:
      # typescript-eslint 8.x only supports TypeScript <6.1.0, so a TS major
      # bump (e.g. 7.x, the native port) crashes the parser during `eslint .`.
      # Hold TypeScript on its current major until typescript-eslint supports
      # the next one, then bump both together and drop this rule.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
